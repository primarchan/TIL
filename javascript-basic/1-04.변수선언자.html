    // var
    var x = 5; // 변수 x에 5을 저장
    var y = 6; // 변수 y에 5을 저장
    var z = x + y; // z에는 11이 저장
    console.log("x", x);
    console.log("y", y);
    console.log("z", z);

    var x = 7; // 재선언 가능
    z = x + y; // 이미 선언된 변수에 새로운 값 할당 가능
    console.log("x", x);
    console.log("z", z);


    // let
    let x1 = 5; // 변수 x1에 5을 저장
    let y1 = 6; // 변수 y1에 5을 저장
    let z1 = x1 = y1; // 변수 z1에 5을 저장

    // let x1 = 7; // 재선언 불가
    x1 = 7; // 이미 선언된 변수에 새로운 값 할당 가능
